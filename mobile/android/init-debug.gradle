// init-debug.gradle - prints JVM and classloader info before settings.gradle is compiled
println "INIT-DEBUG: --- init-debug.gradle starting ---"
try {
  println "INIT-DEBUG: java.version=${System.getProperty('java.version')} java.class.version=${System.getProperty('java.class.version')} JAVA_HOME=${System.getenv('JAVA_HOME')}"
  println "INIT-DEBUG: java.class.path=${System.getProperty('java.class.path')}"
} catch (e) {
  println "INIT-DEBUG: failed to print system props: ${e}"
}

try {
  def cl = this.getClass().getClassLoader()
  println "INIT-DEBUG: init classloader: ${cl.getClass().name}"
  // If URLClassLoader, print URLs
  try {
    if (cl.respondsTo('getURLs')) {
      cl.getURLs().each { println "INIT-DEBUG: classloader URL: ${it}" }
    } else {
      // reflectively try to access getURLs
      def m = cl.getClass().getMethod('getURLs')
      if (m != null) {
        def urls = m.invoke(cl)
        if (urls != null) urls.each { println "INIT-DEBUG: classloader URL: ${it}" }
      }
    }
  } catch (inner) {
    println "INIT-DEBUG: could not list classloader URLs: ${inner}"
  }
} catch (e) {
  println "INIT-DEBUG: classloader print failed: ${e}"
}

// Print Gradle start parameters (included builds / project properties) if available
try {
  println "INIT-DEBUG: startParameter.includedBuilds=${gradle.startParameter.includedBuilds.collect { it.name }}"
  println "INIT-DEBUG: startParameter.projectProperties=${gradle.startParameter.projectProperties}"
} catch (e) {
  println "INIT-DEBUG: startParameter print failed: ${e}"
}

println "INIT-DEBUG: --- init-debug.gradle done ---"